<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure Stewardship Portal: The private gateway for TBBLUSA World Architects and Young Politicians. Access the Legal-Spiritual Bridge infrastructure.">
    <meta name="keywords" content="Stewardship Login, TBBLUSA Private Access, World Architect Portal, Philadelphia Nonprofit Login, Urban Defense Infrastructure, Secure Philanthropy">
    <title>Stewardship Portal | Secure Access | TBBLUSA.ORG</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-leaf: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --liturgical-blue: #0a192f;
            --legal-black: #050505;
            --marble-white: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--liturgical-blue);
            color: white; 
            line-height: 1.8; 
            overflow-x: hidden;
        }

        /* 60PX ULTRA-SLIM CROWN HEADER */
        header {
            background: var(--legal-black);
            position: sticky; top: 0; z-index: 3000;
            display: flex; justify-content: flex-end; align-items: center;
            border-bottom: 2px solid var(--gold-leaf); height: 60px; padding: 0 5%;
        }

        .floating-logo-anchor { position: absolute; left: 5%; top: 0; height: 0; }
        .floating-logo-anchor img { 
            height: 320px; width: auto; 
            filter: drop-shadow(0 0 15px var(--gold-glow));
            animation: divine-glow 5s infinite ease-in-out;
        }

        @keyframes divine-glow {
            0%, 100% { filter: drop-shadow(0 0 10px var(--gold-glow)); }
            50% { filter: drop-shadow(0 0 25px var(--gold-leaf)); }
        }

        /* LOGIN CONTAINER */
        .login-box {
            max-width: 450px;
            margin: 220px auto 100px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold-leaf);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold-leaf); letter-spacing: 3px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 5px; color: var(--gold-leaf); }
        .input-group input { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); 
            border: 1px solid #333; color: white; font-family: 'Montserrat';
        }
        .input-group input:focus { border-color: var(--gold-leaf); outline: none; }

        .login-btn {
            width: 100%; padding: 15px; background: var(--gold-leaf); color: var(--legal-black);
            border: none; font-family: 'Cinzel'; font-weight: 900; letter-spacing: 3px;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .login-btn:hover { background: white; transform: translateY(-2px); }

        .portal-links { margin-top: 30px; font-size: 0.7rem; color: #888; letter-spacing: 1px; }
        .portal-links a { color: var(--gold-leaf); text-decoration: none; }

        footer {
            background: var(--legal-black);
            color: #444;
            padding: 80px 5% 40px;
            text-align: center;
            border-top: 4px solid #111;
        }
    </style>
</head>
<body>

<header>
    <div class="floating-logo-anchor"><img src="COME TO CHRIST TBBLUSA.ORG.png" alt="COME TO CHRIST Logo"></div>
</header>

<div class="login-box">
    <h1>STEWARDSHIP LOGIN</h1>
    <p style="font-family: 'Playfair Display'; font-style: italic; font-size: 0.9rem; margin-bottom: 30px; color: #ccc;">"Adhering to the Security of the Republic."</p>
    
    <form>
        <div class="input-group">
            <label>COVENANT ID</label>
            <input type="text" placeholder="Enter Member ID">
        </div>
        <div class="input-group">
            <label>SECURE KEY</label>
            <input type="password" placeholder="••••••••">
        </div>
        <button type="submit" class="login-btn">ACCESS THE BRIDGE</button>
    </form>

    <div class="portal-links">
        <a href="tithe-and-tribute.html">Register New Seed</a> | <a href="#">Forgot Key?</a>
    </div>
</div>

<p style="text-align: center; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--gold-leaf); letter-spacing: 5px; opacity: 0.5;">
    ENCRYPTED VIA SOVEREIGN VAULT INFRASTRUCTURE
</p>

<footer>
    <img src="COME TO CHRIST TBBLUSA.ORG.png" alt="Logo" style="height: 100px; filter: grayscale(1) opacity(0.2); margin-bottom: 20px;">
    <p style="font-family: 'Cinzel'; letter-spacing: 3px; font-size: 1.2rem;">TBBLUSA.INFO | SECURE ACCESS</p>
    <p style="font-size: 0.6rem; margin-top: 20px;">SYSTEM ARCHITECTURE CERTIFIED 2026. ALL RIGHTS RESERVED TBBLUSA.ORG</p>
</footer>

</body>
</html>
